<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>For Princess ❤️</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }body {
  background: linear-gradient(135deg, #ffdde1, #ee9ca7);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
  padding: 20px;
}

.card {
  background: white;
  padding: 40px 30px;
  border-radius: 24px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.15);
  max-width: 500px;
  width: 100%;
}

h1 {
  font-size: 2rem;
  color: #e63946;
  margin-bottom: 20px;
}

p {
  font-size: 1.1rem;
  color: #444;
  margin-bottom: 30px;
  line-height: 1.6;
}

.buttons {
  display: flex;
  justify-content: center;
  gap: 16px;
  flex-wrap: wrap;
}

button {
  padding: 14px 28px;
  border: none;
  border-radius: 14px;
  font-size: 1rem;
  cursor: pointer;
  transition: 0.3s ease;
}

.yes {
  background: #e63946;
  color: white;
}

.yes:hover {
  transform: scale(1.05);
}

.no {
  background: #ddd;
  color: #333;
  position: relative;
}

#response {
  margin-top: 25px;
  font-size: 1.2rem;
  font-weight: bold;
  color: #e63946;
}

  </style>
</head>
<body>
  <div class="card">
    <h1>Princess ❤️</h1>
    <p>
      From the moment you came into my life, everything became brighter.
      You make my world beautiful, and I just want to ask...
    </p><h1>Will You Be My Valentine? 💌</h1>

<div class="buttons">
  <button class="yes" onclick="sayYes()">Yes 💖</button>
  <button class="no" id="noBtn">No 😅</button>
</div>

<div id="response"></div>

  </div>  <script>
    function sayYes() {
      document.getElementById('response').innerText =
        'Yay! I knew you would say yes ❤️✨';

      setTimeout(() => {
        window.location.href = 'https://wa.me/2348084140106?text=Hi%20my%20love%20%E2%9D%A4%EF%B8%8F%0AI%20clicked%20YES%20%F0%9F%92%96%0AOf%20course%20I%E2%80%99ll%20be%20your%20Valentine%20%E2%9C%A8';
      }, 1500);
    }

    const noBtn = document.getElementById('noBtn');

    function moveNoButton() {
      const card = document.querySelector('.card');
      const maxX = card.offsetWidth / 2 - 80;
      const maxY = 150;
      const x = Math.random() * maxX - maxX / 2;
      const y = Math.random() * maxY - maxY / 2;
      noBtn.style.transform = `translate(${x}px, ${y}px)`;
    }

    noBtn.addEventListener('mouseover', moveNoButton);
    noBtn.addEventListener('click', moveNoButton);
    noBtn.addEventListener('touchstart', moveNoButton);
  </script></body>
</html>
